worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Configuración de logs para Hugging Face
    access_log /dev/stdout;
    error_log /dev/stderr;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen 7860;
        
        # --- Global Proxy Settings ---
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        add_header Content-Security-Policy "frame-ancestors 'self' https://jazm-io-production.up.railway.app" always;

        # Main Entry Point (React CRM)
        location = / {
            root /opt/nexus/web;
            index index.html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # --- Evolution Manager (Frontend Estático Aislado) ---
        location /manager/ {
            root /opt/nexus/web;
            index index.html;
            try_files $uri $uri/ /manager/index.html;
            
            # Forzar carga de sus propios assets
            sub_filter_once off;
            sub_filter_types text/html;
            sub_filter 'src="/assets/' 'src="/manager/assets/';
            sub_filter 'href="/assets/' 'href="/manager/assets/';
        }

        # --- Evolution Manager Assets ---
        location /manager/assets/ {
            root /opt/nexus/web;
            try_files $uri =404;
        }

        # --- Evolution API (Backend) ---
        location /evolution/ {
            proxy_pass http://127.0.0.1:8080/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- n8n Automation (Subpath Ruteo Nativo) ---
        location /n8n/ {
            proxy_pass http://127.0.0.1:3100/n8n/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            
            # Soporte WebSockets (Crucial para conexión persistente)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_read_timeout 8h;
        }

        # --- n8n REST API (requests that hit /rest/ directly) ---
        location /rest/ {
            proxy_pass http://127.0.0.1:3100/n8n/rest/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
        }

        # --- n8n Static Assets fallback (editor requests /assets/ at root) ---
        location /assets/ {
            proxy_pass http://127.0.0.1:3100/n8n/assets/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # --- CRM Assets (Mantenidos en carpeta separada para evitar conflictos) ---
        location /nexus-assets/ {
            root /opt/nexus;
            access_log off;
            expires max;
            add_header Cache-Control "public, no-transform";
            try_files $uri =404;
        }

        location ~* ^/(fonts/|favicon\.ico|manifest\.json) {
            root /opt/nexus/web;
            try_files $uri /manager/$uri /index.html;
        }

        # --- Status Dashboard ---
        location /status {
            proxy_pass http://127.0.0.1:8001/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/status {
            proxy_pass http://127.0.0.1:8001/api/status;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/debug/logs {
            proxy_pass http://127.0.0.1:8001/api/debug/logs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # --- CRM Frontend (Final Fallback) ---
        location / {
            root /opt/nexus/web;
            index index.html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Content-Security-Policy "frame-ancestors 'self' https://jazm-io-production.up.railway.app" always;
        }
    }
}
