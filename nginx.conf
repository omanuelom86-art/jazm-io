worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Configuración de logs para Hugging Face
    access_log /dev/stdout;
    error_log /dev/stderr;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen 7860;
        
        # --- Global Proxy Settings ---
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        add_header Content-Security-Policy "frame-ancestors 'self' https://*.hf.space https://huggingface.co" always;

        # --- CRM Frontend ---
        location / {
            root /opt/nexus/web;
            index index.html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Content-Security-Policy "frame-ancestors 'self' https://*.hf.space https://huggingface.co" always;
        }

        # --- Evolution Manager (Frontend Estático Aislado) ---
        location /manager/ {
            root /opt/nexus;
            index index.html;
            try_files $uri $uri/ /manager/index.html;
            
            # Forzar carga de sus propios assets
            sub_filter_once off;
            sub_filter_types text/html;
            sub_filter 'src="/assets/' 'src="/manager/assets/';
            sub_filter 'href="/assets/' 'href="/manager/assets/';
        }

        # --- Evolution Manager Assets ---
        location /manager/assets/ {
            root /opt/nexus;
            try_files $uri =404;
        }

        # --- Evolution API (Backend) ---
        location /evolution/ {
            proxy_pass http://127.0.0.1:8080/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- n8n Automation (Acceso Nativo con Subruta) ---
        location /n8n/ {
            proxy_pass http://127.0.0.1:5678; # Sin barra final para preservar el prefijo /n8n/
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Ajustes de timeout para n8n
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # --- CRM Assets ---
        location /assets/ {
            root /opt/nexus/web;
            try_files $uri =404;
        }

        location ~* ^/(fonts/|favicon\.ico|manifest\.json) {
            root /opt/nexus/web;
            try_files $uri /manager/$uri /index.html;
        }

        # --- Status Dashboard ---
        location /status {
            proxy_pass http://127.0.0.1:8001/status;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/status {
            proxy_pass http://127.0.0.1:8001/api/status;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
