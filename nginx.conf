worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    access_log /dev/stdout;
    error_log /dev/stderr;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen 7860;
        
        # --- Global Proxy Settings ---
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        add_header Content-Security-Policy "frame-ancestors 'self' https://jazm-io-production.up.railway.app" always;

        # 1. Main Entry Point (React CRM)
        location = / {
            root /opt/nexus/web;
            index index.html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # 2. Evolution Manager (FIX: Aislamiento total de assets)
        location /manager/ {
            root /opt/nexus/web;
            index index.html;
            try_files $uri $uri/ /manager/index.html;
            
            # Forzamos reposicionamiento de rutas internas del manager
            sub_filter_once off;
            sub_filter_types text/html;
            sub_filter 'src="/assets/' 'src="/manager/assets/';
            sub_filter 'href="/assets/' 'href="/manager/assets/';
        }

        # Manager Assets - Prioridad ALTA para evitar que n8n los robe
        location /manager/assets/ {
            alias /opt/nexus/web/manager/assets/;
            access_log off;
            expires max;
            add_header Cache-Control "public, no-transform";
            try_files $uri =404;
        }

        # 3. Evolution API (Backend)
        location /evolution/ {
            proxy_pass http://127.0.0.1:8080/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # 4. n8n Automation (Puerto 3100)
        # N8N_PATH=/n8n/ -> Pass full path untouched
        location /n8n/ {
            proxy_pass http://127.0.0.1:3100;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Prefix /n8n;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_read_timeout 8h;
            proxy_send_timeout 8h;
            proxy_buffering off;
        }

        # Loose assets fallback EXCLUSIVO para n8n
        # Agregamos restricción: solo si no viene de /manager/
        location /assets/ {
            if ($http_referer ~* "/manager/") {
                rewrite ^/assets/(.*)$ /manager/assets/$1 last;
            }
            proxy_pass http://127.0.0.1:3100/n8n/assets/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /rest/ {
            proxy_pass http://127.0.0.1:3100/n8n/rest/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location = /n8n {
            return 301 /n8n/;
        }

        # 5. CRM & Infrastructure
        location /nexus-assets/ {
            root /opt/nexus;
            access_log off;
            expires max;
            add_header Cache-Control "public, no-transform";
            try_files $uri =404;
        }

        location /status {
            proxy_pass http://127.0.0.1:8001/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /api/status {
            proxy_pass http://127.0.0.1:8001/api/status;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # 6. CRM Root Fallback
        location / {
            root /opt/nexus/web;
            index index.html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }
}
