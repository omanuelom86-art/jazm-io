worker_processes auto;
error_log /tmp/nginx/logs/error.log;
pid /tmp/nginx/logs/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Move temp folders to /tmp/ for Permission Denied fix
    client_body_temp_path /tmp/client_body;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    access_log /dev/stdout;
    error_log /dev/stderr;

    # ELIMINADO: gzip on; (Duplicado)
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen 7860 default_server;
        server_name _;
        
        # --- Global Proxy Settings ---
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        add_header Content-Security-Policy "frame-ancestors 'self' https://jazm-io-production.up.railway.app" always;

        # 1. Main Entry Point (React CRM)
        location = / {
            root /opt/nexus/web;
            index index.html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # 2. Evolution Manager (FIX: Aislamiento total de assets)
        location /manager/ {
            root /opt/nexus/web;
            index index.html;
            try_files $uri $uri/ /manager/index.html;
            
            # Forzamos reposicionamiento de rutas internas del manager
            sub_filter_once off;
            sub_filter_types text/html;
            sub_filter 'src="/assets/' 'src="/manager/assets/';
            sub_filter 'href="/assets/' 'href="/manager/assets/';
        }

        # Manager Assets - Prioridad ALTA para evitar que n8n los robe
        location /manager/assets/ {
            alias /opt/nexus/web/manager/assets/;
            access_log off;
            expires max;
            add_header Cache-Control "public, no-transform";
            try_files $uri =404;
        }

        # 3. Evolution API (Backend)
        location /evolution/ {
            proxy_pass http://127.0.0.1:8080/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # 4. n8n Automation (Puerto 3100)
        # ^~ garantiza que esta regla tenga PRIORIDAD MAXIMA sobre location /
        # Sin esto, el try_files /index.html del CRM captura los assets de n8n
        location ^~ /n8n/ {
            proxy_pass http://127.0.0.1:3100/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Prefix /n8n;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_read_timeout 8h;
            proxy_send_timeout 8h;
            proxy_buffering off;

            gzip off;
            proxy_set_header Accept-Encoding "";
            proxy_hide_header Content-Encoding;
        }

        # Webhook endpoints de n8n
        location ^~ /n8n/webhook/ {
            proxy_pass http://127.0.0.1:3100/webhook/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_read_timeout 8h;
        }

        location = /n8n {
            return 301 /n8n/;
        }

        # 5. CRM & Infrastructure
        location /nexus-assets/ {
            root /opt/nexus/web;
            access_log off;
            expires max;
            add_header Cache-Control "public, no-transform";
            try_files $uri =404;
        }

        location /status {
            proxy_pass http://127.0.0.1:8001/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /api/status {
            proxy_pass http://127.0.0.1:8001/api/status;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # 6. CRM Root Fallback
        location / {
            root /opt/nexus/web;
            index index.html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }
}
