worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    access_log /dev/stdout;
    error_log /dev/stderr;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen 7860;
        
        # --- Global Proxy Settings ---
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        add_header Content-Security-Policy "frame-ancestors 'self' https://jazm-io-production.up.railway.app" always;

        # 1. Main Entry Point (React CRM)
        location = / {
            root /opt/nexus/web;
            index index.html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # 2. Evolution API (Backend)
        location /evolution/ {
            proxy_pass http://127.0.0.1:8080/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # 3. n8n Automation (Estrategia: Strip Prefix)
        # El navegador pide /n8n/ -> Nginx manda / a n8n
        location /n8n/ {
            proxy_pass http://127.0.0.1:3100/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_read_timeout 8h;
            proxy_send_timeout 8h;
            proxy_buffering off;
        }

        location = /n8n {
            return 301 /n8n/;
        }

        # --- N8N ASSETS FALLBACK (Root Interception) ---
        # Como el CRM usa /nexus-assets/, podemos capturar /assets/ para n8n
        location /assets/ {
            proxy_pass http://127.0.0.1:3100/assets/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /rest/ {
            proxy_pass http://127.0.0.1:3100/rest/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /static/ {
            proxy_pass http://127.0.0.1:3100/static/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # 4. CRM & Infrastructure
        location /nexus-assets/ {
            root /opt/nexus;
            access_log off;
            expires max;
            add_header Cache-Control "public, no-transform";
            try_files $uri =404;
        }

        location ~* ^/(fonts/|favicon\.ico|manifest\.json) {
            root /opt/nexus/web;
            try_files $uri /index.html;
        }

        location /status {
            proxy_pass http://127.0.0.1:8001/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/status {
            proxy_pass http://127.0.0.1:8001/api/status;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 5. CRM Root Fallback
        location / {
            root /opt/nexus/web;
            index index.html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }
}
