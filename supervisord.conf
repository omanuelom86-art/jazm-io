[supervisord]
nodaemon=true
; user=root (removed for HF compatibility)
logfile=/dev/null
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid
loglevel=info

; ============================================================
; STATUS DASHBOARD (Puerto 8001)
; ============================================================
[program:status]
command=python3 status.py
autostart=true
autorestart=true
startsecs=3
startretries=5
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=PORT="8001"

; ============================================================
; REDIS (Requerido por Evolution API)
; ============================================================
[program:redis]
command=redis-server /etc/redis/redis.conf
autostart=true
autorestart=true
startsecs=2
startretries=5
priority=20
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; ============================================================
; EVOLUTION API (Puerto 8080)
; ============================================================
[program:evolution]
command=/bin/bash start_evolution.sh
directory=/opt/nexus
autostart=true
autorestart=true
startsecs=5
startretries=5
priority=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=PORT="8080",SERVER_URL="https://info86-new-espacio-jazmio.hf.space",DEL_INSTANCE="false"

; ============================================================
; N8N AUTOMATION (Puerto 5678)
; ============================================================
[program:n8n]
command=/bin/bash start_n8n.sh
directory=/opt/nexus
autostart=true
autorestart=true
startsecs=8
startretries=5
priority=40
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=N8N_PORT="5678",N8N_PATH="/n8n",N8N_EDITOR_BASE_URL="https://info86-new-espacio-jazmio.hf.space/n8n",WEBHOOK_URL="https://info86-new-espacio-jazmio.hf.space/n8n/",N8N_USER_FOLDER="/opt/nexus/.n8n",EXECUTIONS_PROCESS="main",N8N_ENCRYPTION_KEY="jazmio-nexus-key-2024"

; ============================================================
; NGINX (Puerto 7860 — Puerto público HF)
; ============================================================
[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
startsecs=3
startretries=5
priority=50
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
