<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jazm.io - CRM Inteligente</title>
    <script type="module" crossorigin src="/assets/index-Bc6IvWS4.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DrcM231M.css">
    <style>
      :root {
        --glass-bg: rgba(255, 255, 255, 0.7);
        --glass-border: rgba(255, 255, 255, 0.3);
        --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        --accent-primary: #6366f1;
        --accent-secondary: #a855f7;
        --accent-success: #10b981;
      }

      body {
        background: radial-gradient(circle at top left, #f3f4f6, #e5e7eb) !important;
        font-family: 'Outfit', sans-serif !important;
      }

      #root {
        transition: all 0.3s ease;
      }

      /* Glassmorphism Overrides */
      .bg-white {
        background: var(--glass-bg) !important;
        -webkit-backdrop-filter: blur(12px) !important;
        backdrop-filter: blur(12px) !important;
        border: 1px solid var(--glass-border) !important;
        box-shadow: var(--glass-shadow) !important;
      }

      .rounded-2xl {
        border-radius: 1.5rem !important;
      }

      .text-indigo-600 {
        color: var(--accent-primary) !important;
      }

      .bg-indigo-600 {
        background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)) !important;
        border: none !important;
      }

      .hover\:bg-indigo-700:hover {
        background: linear-gradient(135deg, var(--accent-secondary), var(--accent-primary)) !important;
        transform: translateY(-2px);
        box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
      }

      /* Animations */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .animate-fade-in {
        animation: fadeIn 0.5s ease forwards;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: rgba(99, 102, 241, 0.2);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover { background: rgba(99, 102, 241, 0.4); }

      /* Botón flotante de WhatsApp premium */
      .whatsapp-float {
        position: fixed;
        bottom: 30px;
        right: 30px;
        background: #25d366;
        color: white;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3);
        z-index: 9999;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      .whatsapp-float:hover {
        transform: scale(1.1) rotate(5deg);
        box-shadow: 0 15px 30px rgba(37, 211, 102, 0.5);
      }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function() {
        const checkPage = () => {
          // --- Inyección de QR en WhatsApp Setup ---
          if (window.location.pathname.includes('/whatsapp-setup')) {
            let container = document.querySelector('.whatsapp-evolution-qr-container');
            if (!container) {
              const target = document.querySelector('div.bg-white.rounded-2xl.shadow-2xl') || document.body;
              container = document.createElement('div');
              container.className = 'whatsapp-evolution-qr-container mt-8 p-6 bg-white rounded-2xl shadow-xl border border-indigo-100';
              container.innerHTML = `
                <div class="flex border-b border-gray-200 mb-6">
                  <button id="tab-manager" class="py-2 px-4 text-sm font-bold border-b-2 border-indigo-600 text-indigo-600">MANAGER</button>
                  <button id="tab-qr" class="py-2 px-4 text-sm font-bold border-b-2 border-transparent text-gray-500 hover:text-indigo-600">CÓDIGO QR</button>
                </div>

                <div id="content-manager" class="block">
                  <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
                    <span class="w-8 h-8 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-xs">EXE</span>
                    Evolution Manager
                  </h3>
                  <div class="flex flex-col md:flex-row gap-6 items-center">
                    <div class="w-full md:w-1/2 border-2 border-dashed border-gray-200 rounded-xl p-4 flex items-center justify-center bg-gray-50 min-h-[300px]">
                      <iframe id="evolution-iframe" src="/manager/" class="w-full h-[500px] border-none rounded-lg shadow-inner"></iframe>
                    </div>
                    <div class="w-full md:w-1/2 space-y-4">
                       <div class="p-4 bg-indigo-50 rounded-xl border border-indigo-100">
                        <h4 class="font-bold text-indigo-900 text-sm mb-2">Instrucciones:</h4>
                        <ol class="text-xs text-indigo-800 space-y-2 list-decimal pl-4">
                          <li>Login API Key: <strong>Supera</strong></li>
                          <li>Crea una instancia para tu empresa.</li>
                          <li>Usa la pestaña <strong>CÓDIGO QR</strong> para escanear.</li>
                        </ol>
                      </div>
                      <button onclick="document.getElementById('evolution-iframe').src='/manager/'" class="block w-full py-3 px-4 bg-green-600 text-white text-center rounded-xl font-bold hover:bg-green-700 transition-colors shadow-lg">
                        Recargar Manager
                      </button>
                    </div>
                  </div>
                </div>

                <div id="content-qr" class="hidden text-center py-10">
                  <h3 class="text-xl font-bold text-gray-800 mb-4">Escanea para conectar WhatsApp</h3>
                  <div id="qr-display" class="mx-auto w-64 h-64 bg-gray-100 rounded-xl flex items-center justify-center border-2 border-indigo-500 relative overflow-hidden">
                    <p class="text-gray-400 text-xs px-4">Esperando instancia... Crea una instancia en la pestaña Manager primero.</p>
                  </div>
                  <div class="mt-6 flex justify-center gap-4">
                    <input id="instance-name" type="text" placeholder="Nombre de Instancia" class="px-4 py-2 border rounded-lg text-sm w-48" value="AgenteComercial">
                    <button id="btn-show-qr" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-indigo-700">Ver QR</button>
                  </div>
                </div>
              `;

              if (target === document.body) {
                 target.appendChild(container);
              } else {
                 if (target.parentElement) target.parentElement.appendChild(container); else target.appendChild(container);
              }

              // Logic for tabs and QR fetch
              const tManager = container.querySelector('#tab-manager');
              const tQr = container.querySelector('#tab-qr');
              const cManager = container.querySelector('#content-manager');
              const cQr = container.querySelector('#content-qr');
              const qrDisplay = container.querySelector('#qr-display');
              const btnShowQr = container.querySelector('#btn-show-qr');
              const instInput = container.querySelector('#instance-name');

              tManager.onclick = () => {
                cManager.className = 'block'; cQr.className = 'hidden';
                tManager.className = 'py-2 px-4 text-sm font-bold border-b-2 border-indigo-600 text-indigo-600';
                tQr.className = 'py-2 px-4 text-sm font-bold border-b-2 border-transparent text-gray-500';
              };

              tQr.onclick = () => {
                cManager.className = 'hidden'; cQr.className = 'block';
                tQr.className = 'py-2 px-4 text-sm font-bold border-b-2 border-indigo-600 text-indigo-600';
                tManager.className = 'py-2 px-4 text-sm font-bold border-b-2 border-transparent text-gray-500';
              };

              btnShowQr.onclick = async () => {
                const inst = instInput.value;
                qrDisplay.innerHTML = '<div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div>';
                try {
                  const r = await fetch(`/instance/connect/qrcode/${inst}`, {
                    headers: { 'apikey': 'Supera' }
                  });
                  const d = await r.json();
                  if (d.code) {
                    qrDisplay.innerHTML = `<img src="${d.code}" class="w-full h-full object-contain p-2" />`;
                  } else {
                    qrDisplay.innerHTML = `<p class="text-red-500 text-xs px-4">Error: ${d.message || 'Instancia no encontrada'}</p>`;
                  }
                } catch (e) {
                   qrDisplay.innerHTML = `<p class="text-red-500 text-xs">Error de conexión</p>`;
                }
              };
            }
          }

          // --- Inyección de Estado Real en el Widget de Servidor ---
          const updateServerWidget = async () => {
            // Buscar elementos que contengan el texto de Oracle
            const allElements = document.querySelectorAll('*');
            for (const el of allElements) {
              if (el.children.length === 0 && el.innerText && el.innerText.includes('Oracle ARM Ampere')) {
                try {
                  const r = await fetch('/api/status');
                  const d = await r.json();
                  
                  // Cambiar el nombre del servidor y specs
                  el.innerText = d.server;
                  
                  // Buscar el elemento de specs/salud que suele estar cerca
                  const parent = el.parentElement;
                  if (parent) {
                    const specsEl = parent.querySelector('div.text-xs') || parent.querySelector('p.text-gray-500');
                    if (specsEl) {
                      specsEl.innerText = `${d.specs} — SALUD ${d.health}%`;
                    }
                    
                    // Cambiar color del puntito si existe
                    const dot = parent.querySelector('span.bg-green-500') || parent.querySelector('div.bg-green-500');
                    if (dot) {
                      dot.className = d.health > 80 ? dot.className.replace('bg-red-500', 'bg-green-500') : dot.className.replace('bg-green-500', 'bg-red-500');
                    }
                  }
                } catch (e) {
                  console.error('Error actualizando widget de servidor:', e);
                }
                break; // Solo actualizar el primero que encuentre
              }
            }
          };
          updateServerWidget();
        };
        setInterval(checkPage, 5000);
        checkPage();
      })();
    </script>
  </body>
</html>
